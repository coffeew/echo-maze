<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>回声迷宫 - Echo Maze</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            background: #060610;
            color: #fff;
            font-family: 'Arial', sans-serif;
            width: 100%; height: 100%;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }
        #root {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%; height: 100%;
        }
        #title {
            font-size: clamp(11px, 2.5vw, 18px);
            letter-spacing: clamp(2px, 1vw, 4px);
            color: #4488ff;
            padding: 5px 0 2px;
            text-shadow: 0 0 12px #4488ff;
            flex-shrink: 0;
        }

        /* HUD 在画布外部，不遮视野 */
        #hud {
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 2px 10px 2px;
            flex-shrink: 0;
        }
        .hud-pill {
            background: rgba(0,0,0,0.6);
            border: 1px solid #223;
            padding: 3px 10px;
            border-radius: 16px;
            font-size: clamp(11px, 2.8vw, 14px);
            font-weight: bold;
        }
        #emitCount { color: #44bbff; }
        #levelName  { color: #ffbb33; }

        #gameWrap {
            position: relative;
            flex-shrink: 0;
        }
        canvas {
            display: block;
            border: 1px solid #1a2050;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(30,80,200,0.4);
            touch-action: none;
        }

        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 20px;
        }
        #overlay h2 { font-size: clamp(18px, 5vw, 26px); text-shadow: 0 0 12px #fff; text-align: center; }
        #overlay p  { font-size: clamp(12px, 3vw, 14px); color: #aaa; max-width: 280px; text-align: center; line-height: 1.6; }
        #overlay .btn-row { display: flex; gap: 12px; margin-top: 4px; flex-wrap: wrap; justify-content: center; }
        .btn {
            background: linear-gradient(135deg, #3355cc, #6633cc);
            color: #fff; border: none;
            padding: clamp(7px,2vw,10px) clamp(16px,4vw,24px);
            border-radius: 24px;
            font-size: clamp(12px, 3.5vw, 14px);
            cursor: pointer;
            min-width: 76px;
        }
        .btn:active { opacity: 0.8; }
        .btn.secondary { background: linear-gradient(135deg, #224, #335); }

        #bottomBar {
            flex-shrink: 0;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #desktopControls {
            display: flex; flex-direction: column;
            align-items: center; gap: 6px; padding: 6px 0;
        }
        #desktopControls .btn-row { display: flex; gap: 10px; }
        #hint { color: #445; font-size: 11px; text-align: center; }

        /* 移动端摇杆区：紧凑高度 */
        #mobileControls {
            display: none;
            width: 100%;
            padding: 4px 20px;
            align-items: center;
            justify-content: space-between;
            height: 110px;
        }
        #dpad {
            position: relative;
            width: 110px; height: 110px;
            flex-shrink: 0;
        }
        .dpad-btn {
            position: absolute;
            width: 36px; height: 36px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.22);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; cursor: pointer;
        }
        .dpad-btn:active { background: rgba(255,255,255,0.3); }
        #dUp    { top:0;   left:37px; }
        #dDown  { top:74px; left:37px; }
        #dLeft  { top:37px; left:0; }
        #dRight { top:37px; left:74px; }

        #emitBtn {
            width: 72px; height: 72px;
            background: radial-gradient(circle, rgba(0,150,255,0.35), rgba(0,80,200,0.18));
            border: 2px solid rgba(0,150,255,0.5);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column;
            font-size: 22px; cursor: pointer; flex-shrink: 0;
        }
        #emitBtn span { font-size: 9px; color: #88ccff; margin-top: 1px; }
        #emitBtn:active { background: radial-gradient(circle, rgba(0,180,255,0.5), rgba(0,100,220,0.3)); }

        #mobileCtrlBtns {
            display: flex; flex-direction: column; gap: 8px;
        }
        .sm-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #aaa; border-radius: 14px;
            padding: 5px 12px; font-size: 11px; cursor: pointer;
        }
        .sm-btn:active { background: rgba(255,255,255,0.2); }

        @media (max-width: 600px), (max-height: 700px) {
            #desktopControls { display: none !important; }
            #mobileControls  { display: flex !important; }
            #title { font-size: 11px; padding: 3px 0 1px; }
        }
    </style>
</head>
<body>
<div id="root">
    <div id="title">E C H O &nbsp; M A Z E &nbsp; 回声迷宫</div>
    <!-- HUD 在画布外，不遮视野 -->
    <div id="hud">
        <div class="hud-pill" id="emitCount">声波: --</div>
        <div class="hud-pill" id="levelName">--</div>
    </div>
    <div id="gameWrap">
        <canvas id="c"></canvas>
        <div id="overlay">
            <h2>回声迷宫</h2>
            <p>在完全黑暗的迷宫中<br>点击/触屏发出声波<br>听回声判断墙壁方向<br>找到绿色出口逃脱</p>
            <div class="btn-row">
                <button class="btn" id="startBtn">开始游戏</button>
            </div>
        </div>
    </div>

    <div id="bottomBar">
        <!-- 桌面：按钮+提示 -->
        <div id="desktopControls">
            <div class="btn-row">
                <button class="btn secondary" onclick="G.restart()">重新开始</button>
                <button class="btn secondary" onclick="G.nextLevel()">下一关</button>
            </div>
            <div id="hint">点击画布：发出声波 &nbsp;|&nbsp; WASD / 方向键：移动</div>
        </div>
        <!-- 移动端：虚拟摇杆 -->
        <div id="mobileControls">
            <div id="dpad">
                <div class="dpad-btn" id="dUp">▲</div>
                <div class="dpad-btn" id="dDown">▼</div>
                <div class="dpad-btn" id="dLeft">◀</div>
                <div class="dpad-btn" id="dRight">▶</div>
            </div>
            <div id="mobileCtrlBtns">
                <button class="sm-btn" onclick="G.restart()">重新开始</button>
                <button class="sm-btn" onclick="G.nextLevel()">下一关</button>
            </div>
            <div id="emitBtn">
                🔊
                <span>发声波</span>
            </div>
        </div>
    </div>
</div>

<script>
// ─────────────────────────────────────────────
//  辅助
// ─────────────────────────────────────────────
function rnd(a, b){ return Math.floor(Math.random()*(b-a+1))+a; }
function dist2(ax,ay,bx,by){ return Math.sqrt((ax-bx)**2+(ay-by)**2); }

// ─────────────────────────────────────────────
//  迷宫生成（Perfect Maze，DFS Recursive Backtracker）
//  保证连通，每格只有一条路
// ─────────────────────────────────────────────
class MazeGen {
    // cols/rows: 迷宫格子数（奇数）
    // 返回: { walls: [{x,y,w,h,mat}], cellW, cellH }
    static generate(cols, rows, cellW, cellH, wallT, matFn) {
        // maze[r][c] = true 表示"通道"
        const visited = Array.from({length: rows}, () => new Array(cols).fill(false));
        const passages = new Set(); // "r1,c1-r2,c2" => 两格之间的通道打开

        function dfs(r, c) {
            visited[r][c] = true;
            const dirs = [[0,1],[0,-1],[1,0],[-1,0]].sort(()=>Math.random()-.5);
            for (const [dr, dc] of dirs) {
                const nr = r + dr, nc = c + dc;
                if (nr>=0 && nr<rows && nc>=0 && nc<cols && !visited[nr][nc]) {
                    // 打通 (r,c) -> (nr,nc)
                    passages.add(`${Math.min(r,nr)},${Math.min(c,nc)}-${Math.max(r,nr)},${Math.max(c,nc)}`);
                    dfs(nr, nc);
                }
            }
        }
        dfs(0, 0);

        const walls = [];
        // 外边界
        walls.push({x:0, y:0, w:cols*cellW, h:wallT, mat:'stone'});         // 上
        walls.push({x:0, y:rows*cellH-wallT, w:cols*cellW, h:wallT, mat:'stone'}); // 下
        walls.push({x:0, y:0, w:wallT, h:rows*cellH, mat:'stone'});          // 左
        walls.push({x:cols*cellW-wallT, y:0, w:wallT, h:rows*cellH, mat:'stone'}); // 右

        // 内部墙：格子之间若未打通则建墙
        for (let r=0; r<rows; r++) {
            for (let c=0; c<cols; c++) {
                // 右边墙
                if (c+1 < cols) {
                    const key = `${r},${c}-${r},${c+1}`;
                    if (!passages.has(key)) {
                        walls.push({
                            x: (c+1)*cellW - wallT/2,
                            y: r*cellH,
                            w: wallT, h: cellH,
                            mat: matFn(r,c,'v')
                        });
                    }
                }
                // 下边墙
                if (r+1 < rows) {
                    const key = `${r},${c}-${r+1},${c}`;
                    if (!passages.has(key)) {
                        walls.push({
                            x: c*cellW,
                            y: (r+1)*cellH - wallT/2,
                            w: cellW, h: wallT,
                            mat: matFn(r,c,'h')
                        });
                    }
                }
            }
        }
        return walls;
    }
}

// ─────────────────────────────────────────────
//  音频
// ─────────────────────────────────────────────
class Audio {
    constructor() {
        try { this.ctx = new (window.AudioContext||window.webkitAudioContext)(); }
        catch(e) { this.ctx = null; }
    }
    _play(freq, dur, type='sine', vol=0.25, delay=0) {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const g   = this.ctx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        g.gain.setValueAtTime(vol, this.ctx.currentTime + delay);
        g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + delay + dur);
        osc.connect(g); g.connect(this.ctx.destination);
        osc.start(this.ctx.currentTime + delay);
        osc.stop(this.ctx.currentTime + delay + dur);
    }
    emit() {
        // 柔和的低频水滴音：短促淡入淡出
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const g   = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(320, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(180, this.ctx.currentTime + 0.12);
        g.gain.setValueAtTime(0, this.ctx.currentTime);
        g.gain.linearRampToValueAtTime(0.15, this.ctx.currentTime + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.18);
        osc.connect(g); g.connect(this.ctx.destination);
        osc.start(this.ctx.currentTime);
        osc.stop(this.ctx.currentTime + 0.2);
    }
    echo(dist, mat) {
        const base = mat==='metal' ? 420 : mat==='wood' ? 240 : 180;
        const freq = base * Math.max(0.5, 1 - dist/800);
        const delay = dist / 5000;
        // 统一用 sine，柔和不刺耳；金属加轻微混响感（稍长持续）
        const dur = mat==='metal' ? 0.35 : 0.22;
        this._play(freq, dur, 'sine', 0.12, delay);
    }
    win()  { [523,659,784,1047].forEach((f,i)=>this._play(f,0.2,'sine',0.25,i*0.15)); }
    fail() { this._play(220, 0.5, 'sine', 0.15); }
    step() { this._play(rnd(200,240), 0.04, 'sine', 0.05); }
}

// ─────────────────────────────────────────────
//  关卡定义
// ─────────────────────────────────────────────
const LEVELS = [
    { name:'第一关 · 初探黑暗', cols:10, rows:8,  emits:10, desc:'找到绿色出口，声波有限，谨慎使用' },
    { name:'第二关 · 幽暗走廊', cols:13, rows:10, emits:8,  desc:'迷宫更大，每次声波都要算准方向' },
    { name:'第三关 · 深渊迷宫', cols:16, rows:11, emits:7,  desc:'几乎看不见，声波是你唯一的眼睛' },
    { name:'第四关 · 绝境求生', cols:20, rows:13, emits:6,  desc:'极限挑战，用6次声波穿越迷宫' },
];

// ─────────────────────────────────────────────
//  主游戏类
// ─────────────────────────────────────────────
class Game {
    constructor() {
        this.canvas  = document.getElementById('c');
        this.ctx     = this.canvas.getContext('2d');
        this.audio   = new Audio();
        this.overlay = document.getElementById('overlay');
        this.emitEl  = document.getElementById('emitCount');
        this.nameEl  = document.getElementById('levelName');

        this.WALL_T  = 10;
        this.levelIdx = 0;
        this.running  = false;

        // ── 画布自适应屏幕 ──
        this._resizeCanvas();
        window.addEventListener('resize', () => this._resizeCanvas());

        // 键盘方向
        this.keys = {};
        window.addEventListener('keydown', e => { this.keys[e.key] = true; });
        window.addEventListener('keyup',   e => { this.keys[e.key] = false; });

        // 点击画布发声
        this.canvas.addEventListener('click', e => {
            if (!this.running || this.won || this.dead) return;
            this.emitWave();
        });
        // 触摸画布发声（触摸不触发click，需单独绑定）
        this.canvas.addEventListener('touchend', e => {
            e.preventDefault();
            if (!this.running || this.won || this.dead) return;
            this.emitWave();
        }, { passive: false });

        // 虚拟摇杆
        this._bindDpad();

        document.getElementById('startBtn').addEventListener('click', () => {
            this.audio.ctx && this.audio.ctx.resume();
            this.loadLevel(0);
            this.hideOverlay();
            this.running = true;
        });

        this.loop();
    }

    // ── 关卡加载 ──────────────────────────────
    loadLevel(idx) {
        if (idx >= LEVELS.length) {
            this.showOverlay('🎊 全关通关！', '你已成为回声大师！', false);
            this.running = false;
            return;
        }
        const lv = LEVELS[idx];
        this.levelIdx = idx;
        this.cellW = Math.floor((this.canvas.width  - this.WALL_T) / lv.cols);
        this.cellH = Math.floor((this.canvas.height - this.WALL_T) / lv.rows);
        this.COLS  = lv.cols;
        this.ROWS  = lv.rows;

        // 材质分布：左半石头，右半木头，中间有金属
        const matFn = (r, c, dir) => {
            const cx = c / this.COLS;
            if (cx < 0.33) return 'stone';
            if (cx > 0.66) return 'wood';
            return 'metal';
        };

        this.walls = MazeGen.generate(lv.cols, lv.rows, this.cellW, this.cellH, this.WALL_T, matFn);

        // 玩家在左上角格子中心
        this.px = this.cellW * 0.5;
        this.py = this.cellH * 0.5;
        this.PLAYER_R = Math.min(this.cellW, this.cellH) * 0.22;
        this.SPEED     = Math.min(this.cellW, this.cellH) * 0.04;

        // 出口：随机选一条边的中段，保证与起点距离足够远
        const exits = [
            // 右边中间
            { x: this.cellW * (lv.cols - 0.5), y: this.cellH * (rnd(Math.floor(lv.rows*0.3), Math.floor(lv.rows*0.7))) },
            // 下边中间
            { x: this.cellW * (rnd(Math.floor(lv.cols*0.3), Math.floor(lv.cols*0.7))), y: this.cellH * (lv.rows - 0.5) },
            // 上边中间（仅关卡2+）
            { x: this.cellW * (rnd(Math.floor(lv.cols*0.4), lv.cols-1)), y: this.cellH * 0.5 },
            // 左边下段（仅关卡3+）
            { x: this.cellW * 0.5, y: this.cellH * (rnd(Math.floor(lv.rows*0.6), lv.rows-1)) },
        ];
        // 按关卡开放的出口候选数
        const candidateCount = Math.min(2 + this.levelIdx, exits.length);
        const chosen = exits[rnd(0, candidateCount - 1)];
        this.exitX = chosen.x;
        this.exitY = chosen.y;
        this.EXIT_R = this.PLAYER_R * 1.6;

        // 声波
        this.waves   = [];
        this.emits   = lv.emits;
        this.maxEmits= lv.emits;
        this.cooldown= 0;
        this.COOL_MAX= 18; // 帧

        // 视野：用 canvas 内的像素 bitmap
        this.fogCanvas = document.createElement('canvas');
        this.fogCanvas.width  = this.canvas.width;
        this.fogCanvas.height = this.canvas.height;
        this.fogCtx = this.fogCanvas.getContext('2d');
        // 初始迷雾：纯黑不透明，防止墙壁轮廓透出
        this.fogCtx.fillStyle = 'rgba(0,0,0,1)';
        this.fogCtx.fillRect(0, 0, this.fogCanvas.width, this.fogCanvas.height);
        // 起点周围揭示一小块
        this.revealCircle(this.px, this.py, this.cellW * 0.45);

        this.won  = false;
        this.dead = false;
        this.stepTimer = 0;

        this.updateHUD();
    }

    restart()   { this.running = true; this.hideOverlay(); this.loadLevel(this.levelIdx); }
    nextLevel() { this.running = true; this.hideOverlay(); this.loadLevel(this.levelIdx + 1); }

    // ── 迷雾 ──────────────────────────────────
    revealCircle(cx, cy, r) {
        // destination-out 擦除迷雾，揭示下方场景
        this.fogCtx.globalCompositeOperation = 'destination-out';
        const grad = this.fogCtx.createRadialGradient(cx, cy, 0, cx, cy, r);
        grad.addColorStop(0,   'rgba(0,0,0,1)');
        grad.addColorStop(0.7, 'rgba(0,0,0,0.85)');
        grad.addColorStop(1,   'rgba(0,0,0,0)');
        this.fogCtx.fillStyle = grad;
        this.fogCtx.beginPath();
        this.fogCtx.arc(cx, cy, r, 0, Math.PI*2);
        this.fogCtx.fill();
        this.fogCtx.globalCompositeOperation = 'source-over';
    }

    // ── 声波 ──────────────────────────────────
    emitWave() {
        if (this.emits <= 0) { this.flashEmpty(); return; }
        if (this.cooldown > 0) return;
        this.emits--;
        this.cooldown = this.COOL_MAX;
        this.audio.emit();
        this.updateHUD();

        // 最后1次声波：播放紧张音效
        if (this.emits === 0) {
            setTimeout(() => { if(this.audio.ctx) this.audio._play(180, 0.4, 'sawtooth', 0.1, 0.05); }, 300);
        }

        const wave = {
            ox: this.px, oy: this.py,
            r: 0,
            maxR: Math.max(this.canvas.width, this.canvas.height) * 1.2,
            speed: 5,
            alpha: 1,
            echos: this.castRays(this.px, this.py),
        };
        this.waves.push(wave);
    }

    castRays(ox, oy) {
        const STEPS = 360;   // 每1度一条射线
        const DSTEP = 1.5;
        const echos = [];
        // 揭示路径上的走廊（每隔 pathStep 揭示一个小点，让玩家看到通道）
        const pathReveal = this.cellW * 0.45;
        const pathStep   = this.cellW * 0.9; // 揭示点间距

        for (let i = 0; i < STEPS; i++) {
            const angle = (i / STEPS) * Math.PI * 2;
            const dx = Math.cos(angle);
            const dy = Math.sin(angle);

            let wallHits = 0;           // 已穿透墙壁数
            const MAX_PENETRATE = 2;    // 最多穿2面墙继续扩散
            let inWall = false;
            let nextPathReveal = pathStep;

            for (let d = 4; d < 1200; d += DSTEP) {
                const cx = ox + dx * d;
                const cy = oy + dy * d;
                if (cx < 0 || cy < 0 || cx > this.canvas.width || cy > this.canvas.height) break;

                const wall = this.hitWall(cx, cy);

                if (wall && !inWall) {
                    // 新碰到一面墙
                    inWall = true;
                    wallHits++;
                    echos.push({ x: cx, y: cy, mat: wall.mat, d, alpha: 1 });
                    // 碰撞点揭示较大圆，让玩家知道墙在哪里
                    this.revealCircle(cx, cy, this.cellW * 0.55);
                    this.audio.echo(d, wall.mat);
                    if (wallHits >= MAX_PENETRATE) break; // 穿透上限，停止
                } else if (!wall && inWall) {
                    // 穿出墙壁，继续在通道内扩散
                    inWall = false;
                }

                // 通道内：沿路揭示（让走廊轮廓可见）
                if (!wall && d >= nextPathReveal) {
                    this.revealCircle(cx, cy, pathReveal * (1 - wallHits * 0.35));
                    nextPathReveal += pathStep;
                }
            }
        }
        return echos;
    }

    hitWall(px, py) {
        for (const w of this.walls) {
            if (px >= w.x && px <= w.x + w.w && py >= w.y && py <= w.y + w.h) return w;
        }
        return null;
    }

    // ── 移动 ──────────────────────────────────
    movePlayer() {
        let vx = 0, vy = 0;
        if (this.keys['ArrowLeft']  || this.keys['a'] || this.keys['A']) vx -= 1;
        if (this.keys['ArrowRight'] || this.keys['d'] || this.keys['D']) vx += 1;
        if (this.keys['ArrowUp']    || this.keys['w'] || this.keys['W']) vy -= 1;
        if (this.keys['ArrowDown']  || this.keys['s'] || this.keys['S']) vy += 1;

        if (vx === 0 && vy === 0) return;

        const len = Math.sqrt(vx*vx + vy*vy);
        vx = vx/len * this.SPEED;
        vy = vy/len * this.SPEED;

        const nx = this.px + vx;
        const ny = this.py + vy;
        const r  = this.PLAYER_R * 0.85;

        // 轴分离碰撞（分别测试X和Y）
        let canX = true, canY = true;
        for (const w of this.walls) {
            if (this._circleRect(nx, this.py, r, w)) canX = false;
            if (this._circleRect(this.px, ny, r, w)) canY = false;
        }
        if (canX) this.px = nx;
        if (canY) this.py = ny;

        if (canX || canY) {
            // 移动不揭示视野——必须靠声波探路
            this.stepTimer++;
            if (this.stepTimer % 16 === 0) this.audio.step();
        }
    }

    _circleRect(cx, cy, cr, r) {
        const nearX = Math.max(r.x, Math.min(cx, r.x + r.w));
        const nearY = Math.max(r.y, Math.min(cy, r.y + r.h));
        return (cx - nearX)**2 + (cy - nearY)**2 < cr*cr;
    }

    // ── Update ────────────────────────────────
    update() {
        if (!this.running || this.won || this.dead) return;

        if (this.cooldown > 0) this.cooldown--;

        this.movePlayer();

        // 迷雾回潮：已揭示区域缓慢重新变暗
        const fogRate = 0.003 + this.levelIdx * 0.0015;
        this.fogCtx.globalCompositeOperation = 'source-over';
        this.fogCtx.fillStyle = `rgba(0,0,0,${fogRate})`;
        this.fogCtx.fillRect(0, 0, this.fogCanvas.width, this.fogCanvas.height);

        // 更新声波
        for (let i = this.waves.length - 1; i >= 0; i--) {
            const w = this.waves[i];
            w.r     += w.speed;
            w.alpha  = Math.max(0, 1 - w.r / w.maxR * 1.4);
            w.echos.forEach(e => { e.alpha = Math.max(0, e.alpha - 0.012); });
            if (w.alpha <= 0) this.waves.splice(i, 1);
        }

        // 到达出口
        if (dist2(this.px, this.py, this.exitX, this.exitY) < this.EXIT_R + this.PLAYER_R) {
            this.win();
        }

        // 声波用尽
        if (this.emits <= 0 && this.waves.length === 0 && !this.won) {
            this.dead = true;
            this.audio.fail();
            this.showOverlay('💀 迷失在黑暗中', '声波耗尽，无法再探路', true);
        }
    }

    // ── Win/Lose ──────────────────────────────
    win() {
        if (this.won) return;
        this.won = true;
        this.audio.win();
        const remain = this.emits;
        const pct = remain / this.maxEmits;
        const stars = pct > 0.6 ? '⭐⭐⭐' : pct > 0.3 ? '⭐⭐' : '⭐';
        this.showOverlay(`${stars} 通关！`, `剩余声波: ${remain} / ${this.maxEmits}`, true, true);
    }

    flashEmpty() {
        this.emitEl.style.animation = 'none';
        this.emitEl.style.color = '#ff4444';
        setTimeout(() => { this.emitEl.style.color = ''; }, 400);
    }

    // ── Render ────────────────────────────────
    render() {
        const ctx = this.ctx;
        const W = this.canvas.width, H = this.canvas.height;

        ctx.fillStyle = '#12162a';
        ctx.fillRect(0, 0, W, H);

        if (!this.running && !this.won) return;

        // 墙壁
        const MATS = {
            stone: { fill: '#6e6e82', hi: '#9090a8' },
            metal: { fill: '#9aaebb', hi: '#c0d0d8' },
            wood:  { fill: '#7d4820', hi: '#a06030' },
        };
        for (const w of this.walls) {
            const m = MATS[w.mat] || MATS.stone;
            ctx.fillStyle = m.fill;
            ctx.fillRect(w.x, w.y, w.w, w.h);
            ctx.fillStyle = m.hi;
            ctx.fillRect(w.x+1, w.y+1, w.w-2, 2);
        }

        // 出口（在迷雾下方，揭示后才可见）
        const exPulse = 0.7 + 0.3 * Math.sin(Date.now() / 300);
        const exGrad = ctx.createRadialGradient(this.exitX, this.exitY, 0, this.exitX, this.exitY, this.EXIT_R * 1.8);
        exGrad.addColorStop(0,   `rgba(0,255,80,${exPulse})`);
        exGrad.addColorStop(0.5, `rgba(0,200,60,${exPulse*0.5})`);
        exGrad.addColorStop(1,   'rgba(0,180,40,0)');
        ctx.beginPath();
        ctx.arc(this.exitX, this.exitY, this.EXIT_R * 1.8, 0, Math.PI*2);
        ctx.fillStyle = exGrad;
        ctx.fill();

        // 声波圆 + 回声点
        for (const w of this.waves) {
            // 主波纹
            ctx.beginPath();
            ctx.arc(w.ox, w.oy, w.r, 0, Math.PI*2);
            ctx.strokeStyle = `rgba(80,160,255,${w.alpha * 0.7})`;
            ctx.lineWidth = 2;
            ctx.stroke();

            // 回声点（带材质颜色）
            for (const e of w.echos) {
                if (e.alpha <= 0) continue;
                const ec = e.mat === 'metal' ? `rgba(180,210,240,${e.alpha})` :
                           e.mat === 'wood'  ? `rgba(200,130,80,${e.alpha})` :
                                               `rgba(160,160,175,${e.alpha})`;
                ctx.beginPath();
                ctx.arc(e.x, e.y, 5, 0, Math.PI*2);
                ctx.fillStyle = ec;
                ctx.fill();

                // 短线：表示"墙在这个方向"
                ctx.strokeStyle = ec;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(w.ox, w.oy);
                ctx.lineTo(e.x, e.y);
                ctx.globalAlpha = e.alpha * 0.12;
                ctx.stroke();
                ctx.globalAlpha = 1;
            }
        }

        // 玩家
        const pg = ctx.createRadialGradient(this.px, this.py, 0, this.px, this.py, this.PLAYER_R);
        pg.addColorStop(0, '#ffffff');
        pg.addColorStop(0.6, '#88ccff');
        pg.addColorStop(1, '#2266cc');
        ctx.beginPath();
        ctx.arc(this.px, this.py, this.PLAYER_R, 0, Math.PI*2);
        ctx.fillStyle = pg;
        ctx.fill();
        // 极小的移动视野光晕
        const glow = ctx.createRadialGradient(this.px, this.py, 0, this.px, this.py, this.PLAYER_R * 2.5);
        glow.addColorStop(0, 'rgba(100,180,255,0.25)');
        glow.addColorStop(1, 'rgba(100,180,255,0)');
        ctx.beginPath();
        ctx.arc(this.px, this.py, this.PLAYER_R * 2.5, 0, Math.PI*2);
        ctx.fillStyle = glow;
        ctx.fill();

        // ── 迷雾叠加 ──
        ctx.drawImage(this.fogCanvas, 0, 0);

        // ── 出口标记（迷雾上方，始终可见）──
        this._drawExitMarker(ctx);

        // ── 声波不足时，红色边框警告 ──
        if (this.emits <= 2 && this.running && !this.won && !this.dead) {
            const pulse = 0.4 + 0.4 * Math.abs(Math.sin(Date.now() / 250));
            const border = this.emits === 0 ? pulse : pulse * 0.6;
            ctx.strokeStyle = `rgba(255,30,30,${border})`;
            ctx.lineWidth = 10;
            ctx.strokeRect(5, 5, W - 10, H - 10);
        }
    }

    // ── 出口标记（始终在最顶层）─────────────────
    _drawExitMarker(ctx) {
        const ex = this.exitX, ey = this.exitY;
        const t  = Date.now();
        const pulse = 0.6 + 0.4 * Math.abs(Math.sin(t / 500));

        // 外层光晕
        const outerGrad = ctx.createRadialGradient(ex, ey, 0, ex, ey, this.EXIT_R * 2.5);
        outerGrad.addColorStop(0,   `rgba(0,255,90,${pulse * 0.6})`);
        outerGrad.addColorStop(0.5, `rgba(0,230,70,${pulse * 0.25})`);
        outerGrad.addColorStop(1,   'rgba(0,200,50,0)');
        ctx.beginPath();
        ctx.arc(ex, ey, this.EXIT_R * 2.5, 0, Math.PI*2);
        ctx.fillStyle = outerGrad;
        ctx.fill();

        // 中心实心圆
        ctx.beginPath();
        ctx.arc(ex, ey, this.EXIT_R * 0.7, 0, Math.PI*2);
        ctx.fillStyle = `rgba(0,255,80,${pulse})`;
        ctx.fill();
    }

    // ── HUD ──────────────────────────────────
    updateHUD() {
        const label = this.emits === 0 ? '声波: 无' : `声波: ${this.emits}`;
        this.emitEl.textContent = label;
        this.emitEl.style.color = this.emits === 0 ? '#ff2222' :
                                  this.emits <= 2   ? '#ff4444' :
                                  this.emits <= 4   ? '#ffaa00' : '#44bbff';
        this.nameEl.textContent = LEVELS[this.levelIdx]?.name ?? '';
    }

    // ── Overlay ──────────────────────────────
    hideOverlay() { this.overlay.style.display = 'none'; }
    showOverlay(title, desc, showButtons, isWin=false) {
        const ov = this.overlay;
        ov.style.display = 'flex';
        ov.innerHTML = `
            <h2>${title}</h2>
            <p>${desc}</p>
            ${showButtons ? `<div class="btn-row">
                <button class="btn" onclick="G.restart()">重新开始</button>
                ${isWin && this.levelIdx + 1 < LEVELS.length
                    ? `<button class="btn" onclick="G.nextLevel()">下一关 →</button>`
                    : ''
                }
            </div>` : ''}
        `;
    }

    // ── 画布自适应 ──────────────────────────────
    _resizeCanvas() {
        const isMobile = window.innerWidth <= 600 || window.innerHeight <= 700;
        const titleH   = (document.getElementById('title')?.offsetHeight   || 24) + 4;
        const hudH     = (document.getElementById('hud')?.offsetHeight     || 22) + 4;
        const bottomH  = isMobile ? 118 : 70;
        const pad      = 8;

        const availW = window.innerWidth  - pad * 2;
        const availH = window.innerHeight - titleH - hudH - bottomH - pad;

        const ratio  = 800 / 560;
        let cw = Math.min(availW, availH * ratio);
        let ch = cw / ratio;
        if (ch > availH) { ch = availH; cw = ch * ratio; }

        cw = Math.max(200, Math.floor(cw));
        ch = Math.max(140, Math.floor(ch));

        this.canvas.width  = cw;
        this.canvas.height = ch;
        // 注意：resize 只改尺寸，不重载关卡（重载会导致移动端状态重置）
    }

    // ── 虚拟摇杆 ──────────────────────────────
    _bindDpad() {
        const press = (key, val) => { this.keys[key] = val; };
        const dirs = [
            ['dUp',    'ArrowUp'],
            ['dDown',  'ArrowDown'],
            ['dLeft',  'ArrowLeft'],
            ['dRight', 'ArrowRight'],
        ];
        dirs.forEach(([id, key]) => {
            const el = document.getElementById(id);
            if (!el) return;
            el.addEventListener('touchstart',  e => { e.preventDefault(); press(key, true);  }, { passive: false });
            el.addEventListener('touchend',    e => { e.preventDefault(); press(key, false); }, { passive: false });
            el.addEventListener('touchcancel', e => { e.preventDefault(); press(key, false); }, { passive: false });
            el.addEventListener('mousedown', () => press(key, true));
            el.addEventListener('mouseup',   () => press(key, false));
        });

        // 发声按钮
        const emitBtn = document.getElementById('emitBtn');
        if (emitBtn) {
            emitBtn.addEventListener('touchend', e => {
                e.preventDefault();
                if (!this.running || this.won || this.dead) return;
                this.audio.ctx && this.audio.ctx.resume();
                this.emitWave();
            }, { passive: false });
            emitBtn.addEventListener('click', () => {
                if (!this.running || this.won || this.dead) return;
                this.emitWave();
            });
        }
    }

    // ── Loop ─────────────────────────────────
    loop() {
        this.update();
        this.render();
        this.updateHUD();
        requestAnimationFrame(() => this.loop());
    }
}

const G = new Game();
</script>
